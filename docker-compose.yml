version: '3.8'

services:
  app:
    build: .
    container_name: ai_agent_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
    depends_on:
      - redis
      - qdrant
    networks:
      - ai_agent_network

  redis:
    image: redis:7.0-alpine
    container_name: ai_agent_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai_agent_network

  qdrant:
    image: qdrant/qdrant:v1.5.0
    container_name: ai_agent_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_agent_network

networks:
  ai_agent_network:
    driver: bridge

volumes:
  redis_data:
  qdrant_data:
